name: iOS-appetize-build

on:
  workflow_dispatch:

jobs:
  build-ios:
    name: 🎉 iOS Build for Appetize
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          architecture: x64
          cache: true

      - name: Install dependencies
        run: flutter pub get


      - name: Clean Flutter
        run: flutter clean

      - name: Remove old iOS build artifacts
        run: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Install CocoaPods
        run: sudo gem install cocoapods

      - name: Install Pods
        run: pod install --repo-update
        working-directory: ios

      - name: Build iOS App
        run: flutter build ios --release --no-codesign

      - name: Prepare Appetize Build
        run: |
          mkdir -p build/appetize
          cp -R build/ios/iphoneos/Runner.app build/appetize/

      - name: Upload Appetize Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-appetize-build
          path: build/appetize/Runner.app