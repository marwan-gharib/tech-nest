name: Test Workflow

on:
  push:
  pull_request:

jobs:
  Testing_Project:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up JDK 24
      uses: actions/setup-java@v2
      with:
        java-version: '24'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.0'

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test